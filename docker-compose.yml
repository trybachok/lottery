name: lottery

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: ${LOTTERY_LOG_MAX_SIZE:-10m}
    max-file: ${LOTTERY_LOG_MAX_FILES:-5}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *json-logging

  lottery-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      LOTTERY_HTTP_PORT: 8080
      LOTTERY_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      LOTTERY_JDBC_USER: ${POSTGRES_USER}
      LOTTERY_JDBC_PASSWORD: ${POSTGRES_PASSWORD}
      LOTTERY_DB_MIGRATIONS_ENABLED: ${LOTTERY_DB_MIGRATIONS_ENABLED:-true}
      LOTTERY_BCRYPT_COST: ${LOTTERY_BCRYPT_COST:-12}
      LOTTERY_ACCESS_TOKEN_TTL_SECONDS: ${LOTTERY_ACCESS_TOKEN_TTL_SECONDS:-900}
      LOTTERY_ACCESS_TOKEN_SECRET: ${LOTTERY_ACCESS_TOKEN_SECRET:?Set LOTTERY_ACCESS_TOKEN_SECRET in .env}
      LOTTERY_MOCK_PAYMENT_WEBHOOK_SECRET: ${LOTTERY_MOCK_PAYMENT_WEBHOOK_SECRET:?Set LOTTERY_MOCK_PAYMENT_WEBHOOK_SECRET in .env}
      LOTTERY_CORS_ALLOWED_ORIGINS: ${LOTTERY_CORS_ALLOWED_ORIGINS:-https://lottery.example.com}
      LOTTERY_FRONTEND_BASE_URL: ${LOTTERY_FRONTEND_BASE_URL:-https://lottery.example.com}
      LOTTERY_BACKEND_BASE_URL: ${LOTTERY_BACKEND_BASE_URL:-https://lottery.example.com/api/v1}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s
    logging: *json-logging

  lottery-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${LOTTERY_HOST_HTTP_PORT:-8080}:8080"
    depends_on:
      lottery-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
    logging: *json-logging

volumes:
  postgres_data:
