openapi: 3.1.0
info:
  title: Lottery System API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /openapi.yaml:
    get:
      operationId: getOpenApiSpec
      summary: Get OpenAPI document
      responses:
        '200':
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string
  /users:
    post:
      operationId: createUser
      summary: Create user
      security:
        - bearerAuth: []
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
  /draws:
    post:
      operationId: createDraw
      summary: Create draw
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Draw created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draw'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDrawRequest'
  /tickets:
    post:
      operationId: createTicket
      summary: Create ticket
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketRequest'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    DrawStatus:
      type: string
      enum: [DRAFT, SCHEDULED, ACTIVE, PAUSED, POSTPONED, SALES_CLOSED, DRAWING, COMPLETED, CANCELLED, TEST, ARCHIVED]
    TicketStatus:
      type: string
      enum: [CREATED, PAYMENT_PENDING, PAID, PAYMENT_FAILED, REFUND_PENDING, REFUNDED, CANCELLED, PARTICIPATED, NOT_PARTICIPATED, CHECKED, WIN, LOSE, DELETED, TEST]
    UserStatus:
      type: string
      enum: [ACTIVE, BLOCKED, DELETED]
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details, requestId]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            requestId:
              type: string
    CreateUserRequest:
      type: object
      required: [email, login]
      properties:
        email:
          type: string
          format: email
        login:
          type: string
        password:
          type: string
          writeOnly: true
    User:
      type: object
      required: [id, email, login, status, createdAt, version]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        login:
          type: string
        status:
          $ref: '#/components/schemas/UserStatus'
        createdAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
    CreateDrawRequest:
      type: object
      required: [title, combinationSchemaId, salesStartAt, salesEndAt, drawAt]
      properties:
        title:
          type: string
        description:
          type: string
        managerId:
          type: string
          format: uuid
        combinationSchemaId:
          type: string
          format: uuid
        salesStartAt:
          type: string
          format: date-time
        salesEndAt:
          type: string
          format: date-time
        drawAt:
          type: string
          format: date-time
        maxTickets:
          type: integer
          minimum: 1
        test:
          type: boolean
          default: false
    Draw:
      type: object
      required: [id, title, description, status, combinationSchemaId, salesStartAt, salesEndAt, drawAt, test, createdAt, version]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/DrawStatus'
        managerId:
          type: string
          format: uuid
        combinationSchemaId:
          type: string
          format: uuid
        salesStartAt:
          type: string
          format: date-time
        salesEndAt:
          type: string
          format: date-time
        drawAt:
          type: string
          format: date-time
        maxTickets:
          type: integer
        test:
          type: boolean
        createdAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
    CreateTicketRequest:
      type: object
      required: [userId, drawId, combinationValues, priceAmount, priceCurrency]
      properties:
        userId:
          type: string
          format: uuid
        drawId:
          type: string
          format: uuid
        combinationValues:
          type: array
          minItems: 1
          items:
            type: string
        priceAmount:
          type: string
          format: decimal
        priceCurrency:
          type: string
          minLength: 3
          maxLength: 3
        test:
          type: boolean
          default: false
    Ticket:
      type: object
      required: [id, userId, drawId, status, combinationValues, priceAmount, priceCurrency, test, createdAt, version]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        drawId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TicketStatus'
        combinationValues:
          type: array
          items:
            type: string
        priceAmount:
          type: string
          format: decimal
        priceCurrency:
          type: string
        test:
          type: boolean
        createdAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
