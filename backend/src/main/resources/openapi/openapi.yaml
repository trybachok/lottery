openapi: 3.1.0
info:
  title: Lottery System API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /openapi.yaml:
    get:
      operationId: getOpenApiSpec
      summary: Get OpenAPI document
      responses:
        '200':
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string
  /auth/register:
    post:
      operationId: registerUser
      summary: Register client user
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
  /auth/login:
    post:
      operationId: loginByPassword
      summary: Login by password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
  /users:
    post:
      operationId: createUser
      summary: Create user
      security:
        - bearerAuth: []
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
  /draws:
    get:
      operationId: getDraws
      summary: Get draws list
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Draws list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawListResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
    post:
      operationId: createDraw
      summary: Create draw
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Draw created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draw'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDrawRequest'
  /draws/{drawId}/run:
    post:
      operationId: runDraw
      summary: Run draw
      security:
        - bearerAuth: []
      parameters:
        - name: drawId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Draw completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDrawResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /tickets:
    get:
      operationId: getTickets
      summary: Get tickets list
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Tickets list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketListResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
    post:
      operationId: createTicket
      summary: Create ticket
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketRequest'
  /tickets/{ticketId}/invoice:
    post:
      operationId: createInvoiceForTicket
      summary: Create payment invoice for ticket
      security:
        - bearerAuth: []
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
  /payments/{paymentId}/refund:
    post:
      operationId: refundPayment
      summary: Refund captured payment
      security:
        - bearerAuth: []
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payment refunded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundPaymentRequest'
  /payment-providers/{providerCode}/webhook:
    post:
      operationId: processPaymentWebhook
      summary: Process signed payment provider webhook
      parameters:
        - name: providerCode
          in: path
          required: true
          schema:
            type: string
        - name: X-Mock-Signature
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentWebhookResult'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookPayload'
  /reports/draws:
    get:
      operationId: getDrawReport
      summary: Get draws report
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DrawIdQuery'
        - $ref: '#/components/parameters/UserIdQuery'
        - $ref: '#/components/parameters/DrawStatusQuery'
        - $ref: '#/components/parameters/DateFromQuery'
        - $ref: '#/components/parameters/DateToQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Draw report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawListResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /reports/tickets:
    get:
      operationId: getTicketReport
      summary: Get tickets report
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdQuery'
        - $ref: '#/components/parameters/DrawIdQuery'
        - $ref: '#/components/parameters/TicketStatusQuery'
        - $ref: '#/components/parameters/DateFromQuery'
        - $ref: '#/components/parameters/DateToQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Ticket report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketListResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /reports/draws/export:
    get:
      operationId: exportDrawReport
      summary: Export draws report
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FormatQuery'
        - $ref: '#/components/parameters/DrawIdQuery'
        - $ref: '#/components/parameters/UserIdQuery'
        - $ref: '#/components/parameters/DrawStatusQuery'
        - $ref: '#/components/parameters/DateFromQuery'
        - $ref: '#/components/parameters/DateToQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Draw report export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawListResponse'
            text/csv:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /reports/tickets/export:
    get:
      operationId: exportTicketReport
      summary: Export tickets report
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FormatQuery'
        - $ref: '#/components/parameters/UserIdQuery'
        - $ref: '#/components/parameters/DrawIdQuery'
        - $ref: '#/components/parameters/TicketStatusQuery'
        - $ref: '#/components/parameters/DateFromQuery'
        - $ref: '#/components/parameters/DateToQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Ticket report export
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketListResponse'
            text/csv:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /admin/audit-logs:
    get:
      operationId: getAuditLogs
      summary: Get audit logs
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdQuery'
        - name: action
          in: query
          schema:
            type: string
        - name: entityType
          in: query
          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/DateFromQuery'
        - $ref: '#/components/parameters/DateToQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogListResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /admin/users:
    get:
      operationId: adminListUsers
      summary: Admin list users
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
    post:
      operationId: adminCreateUser
      summary: Admin create user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /admin/users/{userId}:
    get:
      operationId: adminGetUser
      summary: Admin get user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/Error'
    put:
      operationId: adminUpdateUser
      summary: Admin update user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminUserRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
    delete:
      operationId: adminDeleteUser
      summary: Admin delete user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '204':
          description: User deleted
  /admin/users/{userId}/roles:
    get:
      operationId: adminListUserRoles
      summary: Admin list user roles
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleListResponse'
    post:
      operationId: adminAssignUserRole
      summary: Admin assign role to user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleAssignmentRequest'
      responses:
        '204':
          description: Role assigned
  /admin/users/{userId}/roles/{roleId}:
    delete:
      operationId: adminRemoveUserRole
      summary: Admin remove role from user
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '204':
          description: Role removed
  /admin/roles:
    get:
      operationId: adminListRoles
      summary: Admin list roles
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleListResponse'
    post:
      operationId: adminCreateRole
      summary: Admin create role
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
  /admin/roles/{roleId}:
    get:
      operationId: adminGetRole
      summary: Admin get role
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '200':
          description: Role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
    put:
      operationId: adminUpdateRole
      summary: Admin update role
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoleRequest'
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'
    delete:
      operationId: adminDeleteRole
      summary: Admin delete role
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '204':
          description: Role deleted
  /admin/roles/{roleId}/permissions:
    get:
      operationId: adminListRolePermissions
      summary: Admin list role permissions
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      responses:
        '200':
          description: Role permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionListResponse'
    post:
      operationId: adminAssignRolePermission
      summary: Admin assign permission to role
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionAssignmentRequest'
      responses:
        '204':
          description: Permission assigned
  /admin/roles/{roleId}/permissions/{permissionId}:
    delete:
      operationId: adminRemoveRolePermission
      summary: Admin remove permission from role
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RoleIdPath'
        - $ref: '#/components/parameters/PermissionIdPath'
      responses:
        '204':
          description: Permission removed
  /admin/permissions:
    get:
      operationId: adminListPermissions
      summary: Admin list permissions
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionListResponse'
    post:
      operationId: adminCreatePermission
      summary: Admin create permission
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionRequest'
      responses:
        '201':
          description: Permission created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
  /admin/permissions/{permissionId}:
    get:
      operationId: adminGetPermission
      summary: Admin get permission
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PermissionIdPath'
      responses:
        '200':
          description: Permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
    put:
      operationId: adminUpdatePermission
      summary: Admin update permission
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PermissionIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PermissionRequest'
      responses:
        '200':
          description: Permission updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Permission'
    delete:
      operationId: adminDeletePermission
      summary: Admin delete permission
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PermissionIdPath'
      responses:
        '204':
          description: Permission deleted
  /admin/draws/{drawId}/assign-manager:
    post:
      operationId: adminAssignDrawManager
      summary: Admin assign manager to draw
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DrawIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignManagerRequest'
      responses:
        '200':
          description: Draw updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draw'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-session-token
  parameters:
    UserIdQuery:
      name: userId
      in: query
      schema:
        type: string
        format: uuid
    UserIdPath:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RoleIdPath:
      name: roleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PermissionIdPath:
      name: permissionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DrawIdPath:
      name: drawId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DrawIdQuery:
      name: drawId
      in: query
      schema:
        type: string
        format: uuid
    DrawStatusQuery:
      name: status
      in: query
      schema:
        $ref: '#/components/schemas/DrawStatus'
    TicketStatusQuery:
      name: status
      in: query
      schema:
        $ref: '#/components/schemas/TicketStatus'
    DateFromQuery:
      name: dateFrom
      in: query
      schema:
        type: string
        format: date-time
    DateToQuery:
      name: dateTo
      in: query
      schema:
        type: string
        format: date-time
    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
    OffsetQuery:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    FormatQuery:
      name: format
      in: query
      schema:
        type: string
        enum: [json, csv]
        default: json
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    DrawStatus:
      type: string
      enum: [DRAFT, SCHEDULED, ACTIVE, PAUSED, POSTPONED, SALES_CLOSED, DRAWING, COMPLETED, CANCELLED, TEST, ARCHIVED]
    TicketStatus:
      type: string
      enum: [CREATED, PAYMENT_PENDING, PAID, PAYMENT_FAILED, REFUND_PENDING, REFUNDED, CANCELLED, PARTICIPATED, NOT_PARTICIPATED, CHECKED, WIN, LOSE, DELETED, TEST]
    InvoiceStatus:
      type: string
      enum: [CREATED, PENDING, PAID, FAILED, CANCELLED, REFUND_PENDING, REFUNDED, EXPIRED]
    PaymentStatus:
      type: string
      enum: [INITIATED, AUTHORIZED, CAPTURED, FAILED, CANCELLED, REFUNDED]
    UserStatus:
      type: string
      enum: [ACTIVE, BLOCKED, DELETED]
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details, requestId]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            requestId:
              type: string
    CreateUserRequest:
      type: object
      required: [email, login]
      properties:
        email:
          type: string
          format: email
        login:
          type: string
        password:
          type: string
          writeOnly: true
    AdminUserRequest:
      type: object
      required: [email, login]
      properties:
        email:
          type: string
          format: email
        login:
          type: string
        password:
          type: string
          writeOnly: true
        status:
          $ref: '#/components/schemas/UserStatus'
    UserListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
