openapi: 3.1.0
info:
  title: Lottery System API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /openapi.yaml:
    get:
      operationId: getOpenApiSpec
      summary: Get OpenAPI document
      responses:
        '200':
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string
  /auth/register:
    post:
      operationId: registerUser
      summary: Register client user
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
  /auth/login:
    post:
      operationId: loginByPassword
      summary: Login by password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
  /users:
    post:
      operationId: createUser
      summary: Create user
      security:
        - bearerAuth: []
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
  /draws:
    get:
      operationId: getDraws
      summary: Get draws list
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Draws list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawListResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
    post:
      operationId: createDraw
      summary: Create draw
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Draw created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draw'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDrawRequest'
  /draws/{drawId}/run:
    post:
      operationId: runDraw
      summary: Run draw
      security:
        - bearerAuth: []
      parameters:
        - name: drawId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Draw completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDrawResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /tickets:
    get:
      operationId: getTickets
      summary: Get tickets list
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Tickets list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketListResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
    post:
      operationId: createTicket
      summary: Create ticket
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketRequest'
  /tickets/{ticketId}/invoice:
    post:
      operationId: createInvoiceForTicket
      summary: Create payment invoice for ticket
      security:
        - bearerAuth: []
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
  /payments/{paymentId}/refund:
    post:
      operationId: refundPayment
      summary: Refund captured payment
      security:
        - bearerAuth: []
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payment refunded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundPaymentRequest'
  /payment-providers/{providerCode}/webhook:
    post:
      operationId: processPaymentWebhook
      summary: Process signed payment provider webhook
      parameters:
        - name: providerCode
          in: path
          required: true
          schema:
            type: string
        - name: X-Mock-Signature
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentWebhookResult'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookPayload'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: opaque-session-token
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    DrawStatus:
      type: string
      enum: [DRAFT, SCHEDULED, ACTIVE, PAUSED, POSTPONED, SALES_CLOSED, DRAWING, COMPLETED, CANCELLED, TEST, ARCHIVED]
    TicketStatus:
      type: string
      enum: [CREATED, PAYMENT_PENDING, PAID, PAYMENT_FAILED, REFUND_PENDING, REFUNDED, CANCELLED, PARTICIPATED, NOT_PARTICIPATED, CHECKED, WIN, LOSE, DELETED, TEST]
    InvoiceStatus:
      type: string
      enum: [CREATED, PENDING, PAID, FAILED, CANCELLED, REFUND_PENDING, REFUNDED, EXPIRED]
    PaymentStatus:
      type: string
      enum: [INITIATED, AUTHORIZED, CAPTURED, FAILED, CANCELLED, REFUNDED]
    UserStatus:
      type: string
      enum: [ACTIVE, BLOCKED, DELETED]
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details, requestId]
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: object
              additionalProperties: true
            requestId:
              type: string
    CreateUserRequest:
      type: object
      required: [email, login]
      properties:
        email:
          type: string
          format: email
        login:
          type: string
        password:
          type: string
          writeOnly: true
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        login:
          type: string
        password:
          type: string
          writeOnly: true
    LoginRequest:
      type: object
      required: [loginOrEmail, password]
      properties:
        loginOrEmail:
          type: string
        password:
          type: string
          writeOnly: true
    AuthResponse:
      type: object
      required: [accessToken, tokenType, expiresAt, user]
      properties:
        accessToken:
          type: string
        tokenType:
          type: string
          enum: [Bearer]
        expiresAt:
          type: string
          format: date-time
        user:
          $ref: '#/components/schemas/User'
    User:
      type: object
      required: [id, email, login, status, createdAt, version]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        login:
          type: string
        status:
          $ref: '#/components/schemas/UserStatus'
        createdAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
    CreateDrawRequest:
      type: object
      required: [title, combinationSchemaId, salesStartAt, salesEndAt, drawAt]
      properties:
        title:
          type: string
        description:
          type: string
        managerId:
          type: string
          format: uuid
        combinationSchemaId:
          type: string
          format: uuid
        salesStartAt:
          type: string
          format: date-time
        salesEndAt:
          type: string
          format: date-time
        drawAt:
          type: string
          format: date-time
        maxTickets:
          type: integer
          minimum: 1
        test:
          type: boolean
          default: false
    Draw:
      type: object
      required: [id, title, description, status, combinationSchemaId, salesStartAt, salesEndAt, drawAt, test, createdAt, version]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/DrawStatus'
        managerId:
          type: string
          format: uuid
        combinationSchemaId:
          type: string
          format: uuid
        salesStartAt:
          type: string
          format: date-time
        salesEndAt:
          type: string
          format: date-time
        drawAt:
          type: string
          format: date-time
        maxTickets:
          type: integer
        test:
          type: boolean
        createdAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
    DrawListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Draw'
    RunDrawResponse:
      type: object
      required: [drawId, drawResultId, winningCombinationValues, processedTickets, winningTickets, losingTickets, completedAt]
      properties:
        drawId:
          type: string
          format: uuid
        drawResultId:
          type: string
          format: uuid
        winningCombinationValues:
          type: array
          items:
            type: string
        processedTickets:
          type: integer
        winningTickets:
          type: integer
        losingTickets:
          type: integer
        completedAt:
          type: string
          format: date-time
    CreateTicketRequest:
      type: object
      required: [userId, drawId, combinationValues, priceAmount, priceCurrency]
      properties:
        userId:
          type: string
          format: uuid
        drawId:
          type: string
          format: uuid
        combinationValues:
          type: array
          minItems: 1
          items:
            type: string
        priceAmount:
          type: string
          format: decimal
        priceCurrency:
          type: string
          minLength: 3
          maxLength: 3
        test:
          type: boolean
          default: false
    Ticket:
      type: object
      required: [id, userId, drawId, status, combinationValues, priceAmount, priceCurrency, test, createdAt, version]
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        drawId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/TicketStatus'
        combinationValues:
          type: array
          items:
            type: string
        priceAmount:
          type: string
          format: decimal
        priceCurrency:
          type: string
        test:
          type: boolean
        createdAt:
          type: string
          format: date-time
        version:
          type: integer
          format: int64
    TicketListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Ticket'
    CreateInvoiceRequest:
      type: object
      required: [providerCode, idempotencyKey]
      properties:
        providerCode:
          type: string
          example: mock
        idempotencyKey:
          type: string
          minLength: 1
    Invoice:
      type: object
      required: [id, ticketId, userId, providerCode, status, amount, currency, createdAt]
      properties:
        id:
          type: string
          format: uuid
        ticketId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        providerCode:
          type: string
        status:
          $ref: '#/components/schemas/InvoiceStatus'
        amount:
          type: string
          format: decimal
        currency:
          type: string
          minLength: 3
          maxLength: 3
        externalInvoiceId:
          type: string
        paymentUrl:
          type: string
          format: uri
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
    Payment:
      type: object
      required: [id, invoiceId, providerCode, status, amount, currency, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        invoiceId:
          type: string
          format: uuid
        providerCode:
          type: string
        status:
          $ref: '#/components/schemas/PaymentStatus'
        amount:
          type: string
          format: decimal
        currency:
          type: string
          minLength: 3
          maxLength: 3
        externalPaymentId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    RefundPaymentRequest:
      type: object
      required: [idempotencyKey]
      properties:
        idempotencyKey:
          type: string
          minLength: 1
    PaymentWebhookPayload:
      type: object
      required: [eventId, eventType, externalInvoiceId]
      properties:
        eventId:
          type: string
        eventType:
          type: string
          enum: [PAYMENT_SUCCEEDED, PAYMENT_FAILED]
        externalInvoiceId:
          type: string
    PaymentWebhookResult:
      type: object
      required: [eventId, processed, duplicate, status]
      properties:
        eventId:
          type: string
          format: uuid
        processed:
          type: boolean
        duplicate:
          type: boolean
        status:
          type: string
