openapi: 3.1.0
info:
  title: Lottery System API
  version: 0.1.0
servers:
  - url: /api/v1
tags:
  - name: System
    description: Service metadata and contract endpoints.
  - name: Authentication
    description: Registration and password login.
  - name: Users
    description: Public user creation APIs.
  - name: Home Page
    description: Client-facing home page layout and theme configuration.
  - name: Draws
    description: Draw lifecycle, execution and result APIs.
  - name: Tickets
    description: Ticket purchase, ownership and result APIs.
  - name: Payments
    description: Invoices, payments, refunds and provider webhooks.
  - name: Reports
    description: Operational reports and exports.
  - name: Audit
    description: Audit log inspection.
  - name: Admin Users
    description: Administrative user management.
  - name: Admin RBAC
    description: Administrative roles, permissions and assignments.
  - name: Admin Draws
    description: Administrative draw ownership actions.
  - name: Admin Prizes
    description: Administrative prize management.
  - name: Admin Settings
    description: Administrative system settings.
  - name: Admin UI Themes
    description: Administrative UI theme management.
  - name: Admin UI Templates
    description: Administrative home page template management.
paths:
  /openapi.yaml:
    get:
      tags: [System]
      operationId: getOpenApiSpec
      summary: Get OpenAPI document
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OpenAPI YAML document
          content:
            application/yaml:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /auth/register:
    post:
      tags: [Authentication]
      operationId: registerUser
      summary: Register client user
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
  /auth/login:
    post:
      tags: [Authentication]
      operationId: loginByPassword
      summary: Login by password
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
  /home-page:
    get:
      tags: [Home Page]
      operationId: getHomePage
      summary: Get client home page configuration
      responses:
        '200':
          description: Home page template and available themes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomePage'
        '404':
          $ref: '#/components/responses/Error'
  /users:
    post:
      tags: [Users]
      operationId: createUser
      summary: Create user
      security:
        - bearerAuth: []
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
  /draws:
    get:
      tags: [Draws]
      operationId: getDraws
      summary: Get draws list
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Draws list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawListResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
    post:
      tags: [Draws]
      operationId: createDraw
      summary: Create draw
      description: Creates a draw from an existing combination schema or creates a new schema and attaches it to the draw in one operation.
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Draw created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draw'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDrawRequest'
  /draws/{drawId}:
    get:
      tags: [Draws]
      operationId: getDrawById
      summary: Get draw by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DrawIdPath'
      responses:
        '200':
          description: Draw
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draw'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    patch:
      tags: [Draws]
      operationId: updateDraw
      summary: Update draw
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DrawIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDrawRequest'
      responses:
        '200':
          description: Draw updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draw'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /draws/{drawId}/activate:
    post:
      tags: [Draws]
      operationId: activateDraw
      summary: Activate draw
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DrawIdPath'
      responses:
        '200':
          description: Draw activated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draw'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /draws/{drawId}/pause:
    post:
      tags: [Draws]
      operationId: pauseDraw
      summary: Pause draw
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DrawIdPath'
      responses:
        '200':
          description: Draw paused
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draw'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /draws/{drawId}/postpone:
    post:
      tags: [Draws]
      operationId: postponeDraw
      summary: Postpone draw
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DrawIdPath'
      responses:
        '200':
          description: Draw postponed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draw'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /draws/{drawId}/close-sales:
    post:
      tags: [Draws]
      operationId: closeDrawSales
      summary: Close draw sales
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DrawIdPath'
      responses:
        '200':
          description: Draw sales closed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draw'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /draws/{drawId}/cancel:
    post:
      tags: [Draws]
      operationId: cancelDraw
      summary: Cancel draw
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DrawIdPath'
      responses:
        '200':
          description: Draw cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draw'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /draws/{drawId}/archive:
    post:
      tags: [Draws]
      operationId: archiveDraw
      summary: Archive draw
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DrawIdPath'
      responses:
        '200':
          description: Draw archived
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Draw'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /draws/{drawId}/run:
    post:
      tags: [Draws]
      operationId: runDraw
      summary: Run draw
      security:
        - bearerAuth: []
      parameters:
        - name: drawId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Draw completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RunDrawResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /draws/{drawId}/result:
    post:
      tags: [Draws]
      operationId: generateWinningCombination
      summary: Generate winning combination
      description: Creates immutable draw result and moves the draw from SALES_CLOSED to DRAWING.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DrawIdPath'
      responses:
        '201':
          description: Winning combination generated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawResult'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
    get:
      tags: [Draws]
      operationId: getDrawResult
      summary: Get draw result
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DrawIdPath'
      responses:
        '200':
          description: Draw result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawResult'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /tickets:
    get:
      tags: [Tickets]
      operationId: getTickets
      summary: Get tickets list
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Tickets list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketListResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
    post:
      tags: [Tickets]
      operationId: createTicket
      summary: Create ticket
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketRequest'
  /tickets/bulk:
    post:
      tags: [Tickets]
      operationId: bulkCreateTickets
      summary: Bulk create tickets
      security:
        - bearerAuth: []
      responses:
        '201':
          description: Tickets created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCreateTicketsRequest'
  /tickets/{ticketId}:
    get:
      tags: [Tickets]
      operationId: getTicketById
      summary: Get ticket by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TicketIdPath'
      responses:
        '200':
          description: Ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    delete:
      tags: [Tickets]
      operationId: deleteTicket
      summary: Soft delete ticket
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TicketIdPath'
      responses:
        '204':
          description: Ticket deleted
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /tickets/{ticketId}/check:
    post:
      tags: [Tickets]
      operationId: checkTicketResult
      summary: Check ticket result
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TicketIdPath'
      responses:
        '200':
          description: Ticket result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /tickets/{ticketId}/cancel:
    post:
      tags: [Tickets]
      operationId: cancelTicket
      summary: Cancel ticket
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TicketIdPath'
      responses:
        '200':
          description: Ticket cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /tickets/{ticketId}/invoice:
    get:
      tags: [Payments]
      operationId: getTicketInvoice
      summary: Get latest payment invoice for ticket
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TicketIdPath'
      responses:
        '200':
          description: Ticket invoice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
    post:
      tags: [Payments]
      operationId: createInvoiceForTicket
      summary: Create payment invoice for ticket
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TicketIdPath'
      responses:
        '201':
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvoiceRequest'
  /invoices/{invoiceId}:
    get:
      tags: [Payments]
      operationId: getInvoiceById
      summary: Get invoice by id
      security:
        - bearerAuth: []
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invoice
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
  /invoices/{invoiceId}/cancel:
    post:
      tags: [Payments]
      operationId: cancelInvoice
      summary: Cancel active invoice
      security:
        - bearerAuth: []
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invoice cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelInvoiceRequest'
  /invoices/{invoiceId}/expire:
    post:
      tags: [Payments]
      operationId: expireInvoice
      summary: Expire active invoice after expiration time
      security:
        - bearerAuth: []
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Invoice expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invoice'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
  /invoices/{invoiceId}/mock-webhook:
    post:
      tags: [Payments]
      operationId: simulateMockPaymentWebhook
      summary: Simulate mock payment webhook for invoice
      description: Demo helper that signs and processes a mock provider webhook for a pending mock invoice.
      security:
        - bearerAuth: []
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Mock webhook processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentWebhookResult'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MockPaymentWebhookRequest'
  /payments/{paymentId}/refund:
    post:
      tags: [Payments]
      operationId: refundPayment
      summary: Request refund for captured payment
      security:
        - bearerAuth: []
      parameters:
        - name: paymentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Refund request accepted and queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payment'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundPaymentRequest'
  /payment-providers/{providerCode}/webhook:
    post:
      tags: [Payments]
      operationId: processPaymentWebhook
      summary: Process signed payment provider webhook
      parameters:
        - name: providerCode
          in: path
          required: true
          schema:
            type: string
        - name: X-Mock-Signature
          in: header
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Webhook accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentWebhookResult'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentWebhookPayload'
  /reports/draws:
    get:
      tags: [Reports]
      operationId: getDrawReport
      summary: Get draws report
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/DrawIdQuery'
        - $ref: '#/components/parameters/UserIdQuery'
        - $ref: '#/components/parameters/DrawStatusQuery'
        - $ref: '#/components/parameters/DateFromQuery'
        - $ref: '#/components/parameters/DateToQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/OffsetQuery'
      responses:
        '200':
          description: Draw report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DrawReportResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
  /reports/tickets:
    get:
      tags: [Reports]
      operationId: getTicketReport
      summary: Get tickets report
      security:
        - bearerAuth: []
      parameters:
