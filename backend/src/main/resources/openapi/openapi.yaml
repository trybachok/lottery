      name: dateFrom
      in: query
      schema:
        type: string
        format: date-time
    DateToQuery:
      name: dateTo
      in: query
      schema:
        type: string
        format: date-time
    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 100
    OffsetQuery:
      name: offset
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    FormatQuery:
      name: format
      in: query
      schema:
        type: string
        enum: [json, csv]
        default: json
  responses:
    Error:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    DrawStatus:
      type: string
      enum: [DRAFT, SCHEDULED, ACTIVE, PAUSED, POSTPONED, SALES_CLOSED, DRAWING, COMPLETED, CANCELLED, TEST, ARCHIVED]
    TicketStatus:
      type: string
      enum: [CREATED, PAYMENT_PENDING, PAID, PAYMENT_FAILED, REFUND_PENDING, REFUNDED, CANCELLED, PARTICIPATED, NOT_PARTICIPATED, CHECKED, WIN, LOSE, DELETED, TEST]
    InvoiceStatus:
      type: string
      enum: [CREATED, PENDING, PAID, FAILED, CANCELLED, REFUND_PENDING, REFUNDED, EXPIRED]
      description: CREATED means local invoice was created and provider creation is queued; PENDING means provider invoice exists or payment is AUTHORIZED; CANCELLED and EXPIRED release the ticket for a new invoice.
    PaymentStatus:
      type: string
      enum: [INITIATED, AUTHORIZED, CAPTURED, FAILED, CANCELLED, REFUNDED]
      description: AUTHORIZED means provider authorized payment before capture; CANCELLED means provider/local payment was cancelled or invoice expired.
    UserStatus:
      type: string
      enum: [ACTIVE, BLOCKED, DELETED]
